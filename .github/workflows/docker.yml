name: Docker

on:
  push:
    branches: [ "*", "!dev" ]
  pull_request:
    branches: [ "*", "!dev" ]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (poetic)
        uses: docker/build-push-action@v3
        with:
          context: core/python/poetic
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/poetic:latest
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (rusty)
        uses: docker/build-push-action@v3
        with:
          context: core/rust/rusty
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rusty:latest
      - name: Build and push (nightly)
        uses: docker/build-push-action@v3
        with:
          context: core/rust/nightly
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rusty:nightly
      - name: Build and push (crust)
        uses: docker/build-push-action@v3
        with:
          context: core/rust/crust
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crust:latest